<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>퇴근 알리미</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="card">
    <p class="eyebrow">WORKDAY TRACKER</p>
    <h1>퇴근 알리미</h1>
    <p class="desc">근무 설정에 맞춰 남은 시간과 진행률을 자동 계산합니다.</p>

    <div class="tabs" role="tablist" aria-label="화면 탭">
      <button class="tab-btn is-active" id="dashboardTab" data-tab="dashboard" role="tab" aria-selected="true">현황</button>
      <button class="tab-btn" id="settingsTab" data-tab="settings" role="tab" aria-selected="false">설정</button>
    </div>

    <section class="tab-panel" id="dashboardPanel" role="tabpanel" aria-labelledby="dashboardTab">
      <section class="progress-wrap" aria-label="업무 진행률 원형 프로그레스">
        <svg viewBox="0 0 280 280" aria-hidden="true">
          <circle class="track" cx="140" cy="140" r="118"></circle>
          <circle class="progress" id="progressCircle" cx="140" cy="140" r="118"></circle>
        </svg>

        <div class="center">
          <div class="percent" id="percentText">0%</div>
          <div class="subcopy">오늘 업무 진행률</div>
        </div>
      </section>

      <section class="countdown-info" aria-label="남은 시간">
        <div class="label" id="timeLabel">퇴근까지 남은 시간</div>
        <div class="time" id="timeText">00시간 00분 00초</div>
      </section>

      <div class="status" id="statusText">근무 시간 계산 중...</div>

      <section class="meta">
        <div class="meta-item">
          <span>출근 시간</span>
          <strong id="metaStart">09:00</strong>
        </div>
        <div class="meta-item">
          <span>퇴근 시간</span>
          <strong id="metaEnd">18:00</strong>
        </div>
      </section>

      <p class="footnote" id="footnoteText">총 9시간 기준으로 진행률 계산</p>
    </section>

    <section class="tab-panel hidden" id="settingsPanel" role="tabpanel" aria-labelledby="settingsTab">
      <div class="settings-grid">
        <div class="field">
          <span>출근 시간</span>
          <div class="inline-select-row">
            <select id="startHourSelect" aria-label="출근 시"></select>
            <span class="unit">시</span>
            <select id="startMinuteSelect" aria-label="출근 분"></select>
            <span class="unit">분</span>
          </div>
        </div>

        <div class="field">
          <span>근무 시간</span>
          <div class="inline-select-row">
            <select id="workHourSelect" aria-label="근무 시간"></select>
            <span class="unit">시간</span>
            <select id="workMinuteSelect" aria-label="근무 분"></select>
            <span class="unit">분</span>
          </div>
          <label class="check-row">
            <input type="checkbox" id="includeLunchCheckbox" />
            <span>점심시간 포함 (+1시간)</span>
          </label>
          <p class="error-text hidden" id="workDurationError">근무 시간은 0시간 0분으로 설정할 수 없습니다.</p>
        </div>

        <div class="field">
          <span>반차 설정</span>
          <div class="mode-buttons" id="modeButtons">
            <button type="button" class="mode-btn is-active" data-mode="none">해당없음</button>
            <button type="button" class="mode-btn" data-mode="am">오전 반차</button>
            <button type="button" class="mode-btn" data-mode="pm">오후 반차</button>
            <button type="button" class="mode-btn" data-mode="annual">연차</button>
          </div>
        </div>
      </div>
      <p class="footnote">설정은 브라우저에 자동 저장됩니다.</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
